spring.application.name=FlightMgmtSys

# --- Added for Binit's Airport / Scheduled-Flight persistence ---
# Points at the DB created by flight_management_schema.sql. Update credentials for your machine,
# or better, override via env vars / an untracked application-local.properties.
spring.datasource.url=jdbc:mysql://localhost:3306/flight_management_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# The schema is already created by flight_management_schema.sql, so Hibernate should
# only validate against it, not try to generate/alter tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
